<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" width="52" height="52" fill="none">
  <!-- Rounded square background — navy so the cyan monster pops on any tab color -->
  <rect width="52" height="52" rx="10" ry="10" fill="#1a3252"/>

  <!-- Monster shifted right+down to center in the 52x52 box (original viewBox is 40x52) -->
  <g transform="translate(6, 0)">
    <!-- Left horn -->
    <ellipse cx="13" cy="7" rx="3.5" ry="6" fill="#02a9e6" transform="rotate(-18 13 7)"/>
    <!-- Right horn -->
    <ellipse cx="27" cy="7" rx="3.5" ry="6" fill="#02a9e6" transform="rotate(18 27 7)"/>

    <!-- Body blob -->
    <path d="M 6 38 C 2 38 1 33 1 27 L 1 19 C 1 10 5 6 11 5 C 13 2 16 0 20 0 C 24 0 27 2 29 5 C 35 6 39 10 39 19 L 39 27 C 39 33 38 38 34 38 Z" fill="#02a9e6"/>

    <!-- Belly highlight -->
    <ellipse cx="20" cy="26" rx="7" ry="9" fill="white" fill-opacity="0.15"/>

    <!-- Left eye -->
    <circle cx="14" cy="21" r="5.5" fill="white"/>
    <circle cx="15" cy="22" r="2.8" fill="#1a1a1a"/>
    <circle cx="16.5" cy="20.5" r="1" fill="white"/>

    <!-- Right eye -->
    <circle cx="26" cy="21" r="5.5" fill="white"/>
    <circle cx="27" cy="22" r="2.8" fill="#1a1a1a"/>
    <circle cx="28.5" cy="20.5" r="1" fill="white"/>

    <!-- Smile -->
    <path d="M 13 31 Q 20 38 27 31" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Top dot -->
    <circle cx="20" cy="1.5" r="1.8" fill="#02a9e6"/>

    <!-- Feet -->
    <ellipse cx="14" cy="41" rx="5.5" ry="3.5" fill="#02a9e6"/>
    <ellipse cx="26" cy="41" rx="5.5" ry="3.5" fill="#02a9e6"/>
  </g>
</svg>
